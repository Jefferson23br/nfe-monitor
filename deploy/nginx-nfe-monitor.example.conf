# NFe Monitor — exemplo Nginx completo
# Substitua nfe.seudominio.com.br pelo domínio real (somente no servidor).
#
# Instalar na VPS:
#   cp deploy/nginx-nfe-monitor.example.conf /etc/nginx/sites-available/nfe-monitor
#   ln -sf /etc/nginx/sites-available/nfe-monitor /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Document root: use UM dos caminhos abaixo (comente o outro):
#   /root/nfe-monitor/Frontend/nfe   (com chmod 711 em /root)
#   /var/www/nfe-monitor/Frontend/nfe (recomendado para produção)

server {
    listen 80;
    listen [::]:80;
    server_name nfe.seudominio.com.br www.nfe.seudominio.com.br;
    return 301 https://nfe.seudominio.com.br$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nfe.seudominio.com.br;

    ssl_certificate     /etc/letsencrypt/live/nfe.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nfe.seudominio.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/nfe-monitor/Frontend/nfe;
    index login.php index.php;

    client_max_body_size 12M;

    if ($host = www.nfe.seudominio.com.br) {
        return 301 https://nfe.seudominio.com.br$request_uri;
    }

    location = / {
        return 302 /login.php;
    }

    location ^~ /assets/css/ {
        alias /root/nfe-monitor/Frontend/nfe/assets/css/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /assets/js/ {
        alias /root/nfe-monitor/Frontend/nfe/assets/js/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location ^~ /assets/img/ {
        alias /root/nfe-monitor/Frontend/nfe/assets/img/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_read_timeout 120;
    }

    location ~ /\. {
        deny all;
    }

    location ~ ^/(includes|vendor|certs|database)/ {
        deny all;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.nfe.seudominio.com.br;

    ssl_certificate     /etc/letsencrypt/live/nfe.seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nfe.seudominio.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nfe.seudominio.com.br$request_uri;
}
