# Exemplo legado — prefira deploy/nginx-nfe-monitor.example.conf
server {
    listen 80;
    server_name nfe.seudominio.com.br;
    root /var/www/nfe-monitor/Frontend/nfe;
    index index.php;
    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }
}
